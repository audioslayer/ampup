name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "#define MyAppVersion \"$VERSION\"" > installer/version.iss

      - name: Validate version sources
        shell: pwsh
        run: |
          $tagVersion = '${{ steps.version.outputs.version }}'
          $csprojVersion = ([xml](Get-Content AmpUp.csproj)).Project.PropertyGroup.Version
          $assemblyInfo = Get-Content Properties/AssemblyInfo.cs -Raw
          if ($assemblyInfo -notmatch 'AssemblyInformationalVersion\("([^"]+)"\)') {
            throw 'AssemblyInformationalVersion not found in Properties/AssemblyInfo.cs'
          }
          $runtimeVersion = $Matches[1]
          if ($csprojVersion -ne $tagVersion -or $runtimeVersion -ne $tagVersion) {
            throw "Version mismatch: tag=$tagVersion csproj=$csprojVersion runtime=$runtimeVersion"
          }

      - name: Validate packaged font files
        shell: pwsh
        run: |
          Get-ChildItem Fonts -Include *.ttf,*.otf -Recurse | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $header = [System.Text.Encoding]::ASCII.GetString($bytes, 0, [Math]::Min(4, $bytes.Length))
            $sfnt = $bytes.Length -ge 4 -and $bytes[0] -eq 0x00 -and $bytes[1] -eq 0x01 -and $bytes[2] -eq 0x00 -and $bytes[3] -eq 0x00
            if (-not ($sfnt -or $header -eq 'OTTO' -or $header -eq 'ttcf')) {
              throw "Invalid font file header: $($_.FullName)"
            }
          }

      - name: Publish app
        run: dotnet publish -c Release -r win-x64 --self-contained -o publish -p:PublishSingleFile=false -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Install Inno Setup
        uses: egor-tensin/setup-inno@v1

      - name: Build installer
        run: iscc installer/ampup-setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/AmpUp-Setup-*.exe
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
